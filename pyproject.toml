[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "presentmd"
version = "0.1.0"
description = "System for professional presentations generated from plain text"
requires-python = ">=3.12"
dependencies = [
    "typer>=0.12.0",
    "rich>=13.7.0",
    "markdown-it-py>=3.0.0",
    "PyYAML>=6.0.1",
    "Jinja2>=3.1.3",
    "Pygments>=2.17.2"
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]
serve = [
    "watchdog>=4.0.0",
]

[project.scripts]
presentmd = "presentmd.cli.main:app"
